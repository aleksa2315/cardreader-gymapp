services:
  mysql:
    image: mysql:8.4
    container_name: membership-rfid-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cardreader_membership
      MYSQL_USER: cardreader
      MYSQL_PASSWORD: Aleksa21
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/create.sql:/docker-entrypoint-initdb.d/01-create.sql:ro

  backend:
    build: ./backend
    container_name: membership-rfid-backend
    depends_on:
      - mysql
    environment:
      PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: cardreader_membership
      DB_USERNAME: cardreader
      DB_PASSWORD: Aleksa21
      JWT_SECRET: CHANGE_ME_CHANGE_ME_CHANGE_ME_CHANGE_ME_1234567890
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"

volumes:
  mysql_data:
